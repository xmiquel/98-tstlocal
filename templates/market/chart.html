{% extends "base.html" %}
{% block title %}Market Chart — 98-tstlocal{% endblock %}
{% block content %}
<h1>Market Chart</h1>

<form id="chart-controls" method="get" action="/market/chart">
    <label>Symbol:
        <select name="symbol">
            {% for s in symbols %}
            <option value="{{ s }}" {% if s == selected_symbol %}selected{% endif %}>{{ s }}</option>
            {% endfor %}
        </select>
    </label>
    <label>From:
        <input type="date" name="start" value="{{ start }}">
    </label>
    <label>To:
        <input type="date" name="end" value="{{ end }}">
    </label>
    <label>Timeframe:
        <select name="timeframe">
            <option value="1m" {% if timeframe == '1m' %}selected{% endif %}>1 min</option>
            <option value="5m" {% if timeframe == '5m' %}selected{% endif %}>5 min</option>
            <option value="15m" {% if timeframe == '15m' %}selected{% endif %}>15 min</option>
            <option value="30m" {% if timeframe == '30m' %}selected{% endif %}>30 min</option>
            <option value="1h" {% if timeframe == '1h' %}selected{% endif %}>1 hour</option>
            <option value="4h" {% if timeframe == '4h' %}selected{% endif %}>4 hours</option>
            <option value="1d" {% if timeframe == '1d' %}selected{% endif %}>1 day</option>
        </select>
    </label>
    <input type="hidden" name="limit" value="200">
</form>

<div class="chart-layout">
    <div class="chart-main">
        <div id="chart" style="width: 100%; height: 500px; position: relative;">
            <div id="chart-tooltip"></div>
        </div>
        <div id="data-panel" class="data-panel"></div>
    </div>
    <aside id="indicator-panel" class="indicator-panel">
        {% include "indicators/panel.html" %}
    </aside>
</div>

<script src="https://unpkg.com/lightweight-charts@4.2.1/dist/lightweight-charts.standalone.production.js"></script>
<script>
    window.__chartConfig = {
        symbol: "{{ selected_symbol }}",
        timeframe: "{{ timeframe }}",
        limit: {{ limit }},
        start: "{{ start }}",
        end: "{{ end }}",
    };
</script>
<script src="/static/js/chart.js"></script>
<script src="/static/js/chart-indicators.js"></script>
{% endblock %}
