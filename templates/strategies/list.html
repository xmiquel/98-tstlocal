{% extends "base.html" %}
{% block title %}Strategies — 98-tstlocal{% endblock %}
{% block content %}
<h1>Strategies</h1>
<button hx-get="/strategies" hx-target="#strategy-table" hx-swap="outerHTML">Refresh</button>
<div id="strategy-table">
  <table id="strategies-table">
    <thead>
      <tr>
        <th>Name</th>
        <th>Description</th>
        <th>Created</th>
      </tr>
    </thead>
    <tbody>
      {% for s in strategies %}
      <tr>
        <td>{{ s.name }}</td>
        <td>{{ s.description or "" }}</td>
        <td>{{ s.created_at }}</td>
      </tr>
      {% else %}
      <tr>
        <td colspan="3">No strategies yet.</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
