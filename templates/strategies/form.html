{% extends "base.html" %}
{% block title %}
  {% if strategy %}Edit {{ strategy.name }}{% else %}New Strategy{% endif %} — 98-tstlocal
{% endblock %}
{% block content %}
<h1>{% if strategy %}Edit Strategy{% else %}New Strategy{% endif %}</h1>

{% if errors %}
<div class="error-summary">
  <p>{{ errors }}</p>
</div>
{% endif %}

<form action="{{ action }}" method="post"
      {% if method == "put" %}hx-put="{{ action }}"{% else %}hx-post="{{ action }}"{% endif %}
      hx-target="#strategies-table"
      hx-swap="outerHTML">
  <div class="form-group">
    <label for="name">Name</label>
    <input type="text" id="name" name="name" value="{{ strategy.name if strategy else "" }}" required>
  </div>
  <div class="form-group">
    <label for="description">Description</label>
    <textarea id="description" name="description" rows="3">{{ strategy.description if strategy else "" }}</textarea>
  </div>
  <div class="form-actions">
    <button type="submit">{% if strategy %}Update{% else %}Create{% endif %}</button>
    <a href="/strategies" class="cancel-link">Cancel</a>
  </div>
</form>
{% endblock %}
