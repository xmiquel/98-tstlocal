<form id="strategy-form" action="{{ action }}" method="post"
      {% if method == "put" %}hx-put="{{ action }}"{% else %}hx-post="{{ action }}"{% endif %}
      hx-target="#strategy-form"
      hx-swap="outerHTML">
  {% if errors %}
  <div class="error-summary">
    <p>{{ errors }}</p>
  </div>
  {% endif %}
  <div class="form-group">
    <label for="name">Name</label>
    <input type="text" id="name" name="name" value="{{ strategy.name if strategy else "" }}" required>
  </div>
  <div class="form-group">
    <label for="description">Description</label>
    <textarea id="description" name="description" rows="3">{{ strategy.description if strategy else "" }}</textarea>
  </div>
  <div class="form-actions">
    <button type="submit">{% if strategy %}Update{% else %}Create{% endif %}</button>
    <a href="/strategies" class="cancel-link">Cancel</a>
  </div>
</form>
