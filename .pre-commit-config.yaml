# Pre-commit hooks for 98-tstlocal
# Spec: openspec/changes/dev-tooling/specs/python-toolchain/spec.md (Pre-commit Hooks requirement)
# Install: uv run pre-commit install
# Run manually: uv run pre-commit run --all-files
# Local-only by design; CI mirrors these checks directly.
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: uv run mypy .
        language: system
        types: [python]
        pass_filenames: false
